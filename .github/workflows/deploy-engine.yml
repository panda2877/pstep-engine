name: Deploy Engine

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

  push:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PSTEP_SERVER_HOST }}
          username: ${{ secrets.PSTEP_SERVER_USER }}
          key: ${{ secrets.PSTEP_SSH_KEY }}
          script: |
            # 备份当前版本
            if [ -d "/opt/pstep/engine" ]; then
              mv /opt/pstep/engine /opt/pstep/engine-backup-$(date +%Y%m%d-%H%M%S)
            fi
            
            # 创建部署目录
            mkdir -p /opt/pstep/engine
            
            # 部署新版本
            cd /opt/pstep/engine
            # 从 artifact 解压（实际部署时由 CI 系统处理）
            echo "Deploying pstep-engine v${{ needs.build.outputs.version }}"
            
            # 重启服务
            sudo systemctl restart pstep-engine || true
            sudo systemctl status pstep-engine

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PSTEP_SERVER_HOST }}
          username: ${{ secrets.PSTEP_SERVER_USER }}
          key: ${{ secrets.PSTEP_SSH_KEY }}
          script: |
            sleep 5
            curl -f http://localhost:4000/health || exit 1
            echo "Health check passed"
