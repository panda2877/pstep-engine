# ============================================================================
# pstep-engine — 自动部署工作流
#
# 触发方式：
#   1. push 到 main 分支（src/package.json/tsconfig 变化）
#   2. 手动触发 (workflow_dispatch)
#
# 设计：
#   - build 在 runner 上完成（npm ci + tsc），产物 scp 到服务器
#   - 服务器直接 npm install + npm run build + systemctl restart
#   - 部署后 health check 验证
#   - 不需要蓝绿（飞书 WSClient 出站连接，进程重启后自动重连）
# ============================================================================

name: 🚀 Deploy Engine

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-engine.yml'

env:
  DEPLOY_HOST: 134.175.163.213
  DEPLOY_USER: root
  DEPLOY_DIR: /opt/pstep/engine
  SERVICE_NAME: pstep-engine

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci --no-audit
          npm run build

      - name: Verify build output
        run: |
          test -f dist/app.js || { echo "dist/app.js not found"; exit 1; }
          echo "Build OK: $(ls dist/*.js | wc -l) JS files"

      - name: Package (exclude node_modules + .git)
        run: |
          tar czf /tmp/pstep-engine.tar.gz \
            --exclude='node_modules' \
            --exclude='web/node_modules' \
            --exclude='web/dist' \
            --exclude='.git' \
            -C . .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pstep-engine-dist
          path: /tmp/pstep-engine.tar.gz
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pstep-engine-dist
          path: /tmp/

      - name: Upload tarball to server via scp
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          # 用 ssh-keyscan 拿到主机 key，避免首次连接失败
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/pstep-engine.tar.gz root@${DEPLOY_HOST}:/tmp/pstep-engine.tar.gz

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.SSH_KEY }}
          envs: DEPLOY_DIR,SERVICE_NAME
          command_timeout: 10m
          script: |
            set -euo pipefail

            echo "=== [1/6] Stopping service ==="
            systemctl stop ${SERVICE_NAME} 2>/dev/null || true

            echo "=== [2/6] Extracting new code ==="
            # 备份当前 dist（回滚用）
            if [ -d "${DEPLOY_DIR}/dist" ]; then
              cp -r ${DEPLOY_DIR}/dist /tmp/pstep-engine-dist-backup 2>/dev/null || true
            fi
            # 清理旧源码，解压新包（--strip-components=1 去掉顶层 pstep-engine/ 目录）
            rm -rf ${DEPLOY_DIR}/src ${DEPLOY_DIR}/dist
            # 清理之前手动部署留下的嵌套 pstep-engine 目录
            rm -rf ${DEPLOY_DIR}/pstep-engine
            tar xzf /tmp/pstep-engine.tar.gz --strip-components=1 -C ${DEPLOY_DIR}/

            echo "=== [3/6] Installing dependencies ==="
            cd ${DEPLOY_DIR}
            npm install --no-audit 2>&1 | tail -3

            echo "=== [4/6] Building ==="
            npm run build 2>&1 | tail -3

            echo "=== [4b/6] Building Web UI ==="
            cd ${DEPLOY_DIR}/web
            npm install --no-audit 2>&1 | tail -3
            npm run build 2>&1 | tail -3
            cd ${DEPLOY_DIR}

            echo "=== [5/6] Starting service ==="
            systemctl start ${SERVICE_NAME}

            echo "=== [6/6] Health check ==="
            sleep 3
            if curl -sf -m 5 http://127.0.0.1:3005/health; then
              echo ""
              echo "=== ✅ Deploy successful ==="
            else
              echo "ERROR: Health check failed — rolling back"
              if [ -d "/tmp/pstep-engine-dist-backup" ]; then
                rm -rf ${DEPLOY_DIR}/dist
                mv /tmp/pstep-engine-dist-backup ${DEPLOY_DIR}/dist
                systemctl start ${SERVICE_NAME}
                echo "Rolled back to previous dist"
              fi
              journalctl -u ${SERVICE_NAME} -n 30 --no-pager
              exit 1
            fi
