version: '3.8'

services:
  gateway:
    image: pstep-gateway:latest
    build: ../pstep-gateway
    ports:
      - '3001:3001'
    restart: unless-stopped
    volumes:
      - /etc/pstep-gateway:/etc/pstep-gateway
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

  app:
    image: pstep-web:latest
    build: ../pstep-web
    ports:
      - '5173:5173'
    environment:
      - GATEWAY_URL=http://gateway:3001
    depends_on:
      - gateway
    restart: unless-stopped
